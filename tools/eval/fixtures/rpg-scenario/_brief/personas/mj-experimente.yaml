name: MJ expérimenté
role: Adapte le scénario pour une table classique, cherche de la matière réutilisable
goals:
  - Repérer vite les leviers dramatiques et les PNJ exploitables
  - Pouvoir détacher les sous-systèmes du scénario
pains:
  - Fiction et mécanique mêlées, illisibles en jeu
  - Tables de complications trop génériques
reads_for: structure claire, encadrés mécaniques séparables
