name: Lecteur pragmatique
role: Lit vite, décroche si l'univers est confus ou le rythme mou
goals:
  - Comprendre les règles du monde sans relire
  - Ne pas s'ennuyer entre deux images fortes
pains:
  - Flou sur le fonctionnement du monde
  - Longueurs contemplatives sans tension
reads_for: clarté de l'univers, tension maintenue
