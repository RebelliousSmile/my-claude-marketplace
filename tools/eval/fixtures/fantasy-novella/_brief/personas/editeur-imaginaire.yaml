name: Éditeur de l'imaginaire
role: Sélectionne des nouvelles pour une revue, juge la singularité et la tenue
goals:
  - Une voix qui se distingue dès l'incipit
  - Une chute qui résonne sans tout expliquer
pains:
  - Worldbuilding plaqué, métaphores convenues
  - Chutes téléphonées
reads_for: originalité de la voix, maîtrise de la chute
