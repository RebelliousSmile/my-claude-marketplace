name: eval

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: harness (structure brief→output)
        run: node tools/eval/harness.mjs
      - name: coverage (routage)
        run: node tools/eval/coverage.mjs
      - name: selftest (gardes)
        run: node tools/eval/selftest.mjs
