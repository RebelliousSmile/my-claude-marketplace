<!doctype html>
<!--
  WIREFRAME SCAFFOLD — copy to design/wireframes/<story-slug>.html and adapt.
  Rules:
    - Mobile-first: base CSS = mobile core. Enrich with min-width only.
    - Tokens only: every value is a var(--…) from ../adapters/tokens.css. No hardcoded hex/px.
    - Tag enriched regions with data-enrich="md|lg" (revealed via min-width).
    - Tag mobile-only UX with data-mobile-only and pair it with a desktop equivalent.
    - Greybox content is fine; tokens + responsive behavior must be real.
  Media-query px values are written as literals (var() is not allowed in @media conditions),
  each annotated with the breakpoint token it mirrors.
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Wireframe — &lt;story&gt;</title>
  <link rel="stylesheet" href="../adapters/tokens.css" />
  <style>
    /* ---- Wireframe greybox helpers (not part of the design system) ---- */
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--font-family-sans);
      font-size: var(--font-size-body);
      line-height: var(--font-line-height-base, 1.5);
      color: var(--color-semantic-text);
      background: var(--color-semantic-background);
    }
    .gb { background: var(--color-neutral-100, #eee); border: var(--border-width-default, 1px) dashed var(--color-semantic-border); border-radius: var(--radius-md, .5rem); }
    .gb::after { content: attr(data-label); display: block; padding: var(--space-3, .75rem); color: var(--color-semantic-text-muted); font-size: var(--font-size-caption, .875rem); }
    [data-enrich] { outline: 2px solid color-mix(in srgb, var(--color-brand-primary) 40%, transparent); outline-offset: 2px; }
    [data-enrich]::before { content: "enriched ≥ " attr(data-enrich); display:block; font-size:.7rem; color: var(--color-brand-primary); }
    [data-mobile-only]::before { content: "mobile-only"; display:block; font-size:.7rem; color: var(--color-semantic-info, #2563eb); }

    /* ===== MOBILE CORE (base, no media query) ===== */
    .layout { display: flex; flex-direction: column; gap: var(--space-4, 1rem); padding: var(--space-4, 1rem); }
    .enriched { display: none; }                 /* enriched regions hidden on mobile core */
    .sticky-cta {                                /* mobile-only: thumb-reachable primary action */
      position: sticky; bottom: 0; padding: var(--space-3, .75rem);
      background: var(--color-semantic-surface);
    }
    .desktop-nav { display: none; }              /* desktop equivalent of the mobile sticky CTA / bottom bar */

    /* ===== TABLET ≥ md (mirrors --breakpoint-md) ===== */
    @media (min-width: 768px) {                  /* token: breakpoint.md */
      .layout { display: grid; grid-template-columns: 1fr 1fr; }
      .enriched[data-enrich="md"] { display: block; }
    }

    /* ===== DESKTOP ≥ lg (mirrors --breakpoint-lg) ===== */
    @media (min-width: 1024px) {                 /* token: breakpoint.lg */
      .layout { grid-template-columns: 16rem 1fr 20rem; max-width: var(--size-container-lg, 64rem); margin-inline: auto; }
      .enriched[data-enrich] { display: block; }
      .sticky-cta { display: none; }             /* mobile-only pattern removed */
      .desktop-nav { display: block; }           /* replaced by persistent nav */
    }
  </style>
</head>
<body>
  <header class="gb" data-label="Header / brand"></header>

  <main class="layout">
    <nav class="desktop-nav gb" data-label="Persistent nav (desktop equivalent of mobile tab bar)"></nav>

    <section class="gb" data-label="Mobile core content — required, present at every breakpoint"></section>

    <aside class="enriched gb" data-enrich="md" data-label="Enriched: secondary panel (tablet+)"></aside>
    <aside class="enriched gb" data-enrich="lg" data-label="Enriched: detail rail (desktop)"></aside>
  </main>

  <div class="sticky-cta gb" data-mobile-only data-label="Primary CTA — thumb reach (desktop: in nav)"></div>
</body>
</html>
